/* Quadra 30 Years — standalone filmstrip timeline.
   All selectors scoped under #quadra-timeline so it can't collide with
   Drupal theme CSS. Light theme + olive accent, locked. */

#quadra-timeline, #quadra-timeline * { box-sizing: border-box; }

#quadra-timeline {
  /* palette */
  --qdt-bg:          #EFEDE7;
  --qdt-panel:       #FFFFFF;
  --qdt-fg:          #000000;
  --qdt-fg-mute:     rgba(0,0,0,0.75);
  --qdt-fg-soft:     rgba(0,0,0,0.55);
  --qdt-fg-faint:    rgba(0,0,0,0.30);
  --qdt-rule:        rgba(0,0,0,0.18);
  --qdt-rule-soft:   rgba(0,0,0,0.08);
  --qdt-rule-strong: rgba(0,0,0,0.55);
  --qdt-accent:      #4C512C;          /* olive — swap here to re-tint */
  --qdt-caption-bg:  rgba(0,0,0,0.72);
  --qdt-img-bg:      #D8D2C7;

  --qdt-display: 'Rift', 'Oswald', 'Bebas Neue', Impact, sans-serif;
  --qdt-body:    'Helvetica Neue LT', 'Helvetica Neue', Arial, sans-serif;
  --qdt-ease:    cubic-bezier(0.22, 1, 0.36, 1);

  display: flex;
  flex-direction: column;
  width: 100%;
  height: clamp(640px, 86vh, 880px);
  background: var(--qdt-bg);
  color: var(--qdt-fg);
  font-family: var(--qdt-body);
  letter-spacing: 0.04em;
  position: relative;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

#quadra-timeline .qdt-eyebrow {
  font-family: var(--qdt-display);
  font-weight: 500;
  font-size: 14px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--qdt-fg);
}

/* ---- spine ---- */
#quadra-timeline .qdt-spine {
  flex: 0 0 auto;
  padding: 28px 56px 22px;
  border-bottom: 1px solid var(--qdt-rule);
  background: var(--qdt-bg);
  z-index: 5;
}
#quadra-timeline .qdt-spine__inner { display: grid; gap: 22px; }
#quadra-timeline .qdt-spine__label {
  display: flex; align-items: baseline; justify-content: space-between;
}
#quadra-timeline .qdt-spine__counter {
  font-family: var(--qdt-display);
  font-size: 14px; letter-spacing: 0.10em; text-transform: uppercase;
  display: inline-flex; gap: 4px;
}
#quadra-timeline .qdt-spine__counter-num { color: var(--qdt-accent); font-weight: 700; }
#quadra-timeline .qdt-spine__counter-sep { opacity: 0.4; }

#quadra-timeline .qdt-spine__track { position: relative; height: 36px; margin: 0 4px; }
#quadra-timeline .qdt-spine__rule {
  position: absolute; inset: auto 0 12px 0; height: 1px; background: var(--qdt-rule);
}
#quadra-timeline .qdt-spine__progress {
  position: absolute; left: 0; bottom: 12px; height: 1px;
  background: var(--qdt-accent); transition: width 380ms var(--qdt-ease);
}
#quadra-timeline .qdt-tick {
  position: absolute; bottom: 0; transform: translateX(-50%);
  background: none; border: 0; cursor: pointer; padding: 0;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--qdt-fg-soft); transition: color 220ms var(--qdt-ease);
  font-family: var(--qdt-body);
}
#quadra-timeline .qdt-tick__dot {
  width: 9px; height: 9px; background: var(--qdt-bg);
  border: 1px solid var(--qdt-fg-soft); transition: all 220ms var(--qdt-ease);
}
#quadra-timeline .qdt-tick__year {
  font-family: var(--qdt-display); font-weight: 500; font-size: 12px;
  letter-spacing: 0.10em; text-transform: uppercase; white-space: nowrap;
}
#quadra-timeline .qdt-tick:hover { color: var(--qdt-fg); }
#quadra-timeline .qdt-tick.is-active { color: var(--qdt-fg); }
#quadra-timeline .qdt-tick.is-active .qdt-tick__dot {
  background: var(--qdt-accent); border-color: var(--qdt-accent); width: 11px; height: 11px;
}

/* ---- track ---- */
#quadra-timeline .qdt-track {
  flex: 1 1 auto; min-height: 0;
  overflow-x: auto; overflow-y: hidden;
  scroll-snap-type: x mandatory; cursor: grab;
  scrollbar-width: thin; scrollbar-color: var(--qdt-fg-faint) transparent;
}
#quadra-timeline .qdt-track.is-grabbing { cursor: grabbing; }
#quadra-timeline .qdt-track::-webkit-scrollbar { height: 4px; }
#quadra-timeline .qdt-track::-webkit-scrollbar-thumb { background: var(--qdt-fg-faint); }
#quadra-timeline .qdt-track__inner {
  display: flex; height: 100%; padding: 40px 56px 60px; gap: 32px;
}
#quadra-timeline .qdt-panel {
  flex: 0 0 min(76vw, 880px); scroll-snap-align: center;
  display: grid; grid-template-columns: 1fr 1fr; gap: 28px;
  border: 1px solid var(--qdt-rule); background: var(--qdt-panel);
  transition: border-color 280ms var(--qdt-ease); cursor: pointer; user-select: none;
}
#quadra-timeline .qdt-panel.is-active { border-color: var(--qdt-rule-strong); }
#quadra-timeline .qdt-panel__media { position: relative; background: var(--qdt-img-bg); overflow: hidden; }
#quadra-timeline .qdt-panel__media img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 600ms var(--qdt-ease);
}
#quadra-timeline .qdt-panel.is-active .qdt-panel__media img { transform: scale(1.04); }
#quadra-timeline .qdt-panel__product {
  position: absolute; left: 16px; bottom: 12px;
  font-family: var(--qdt-display); font-weight: 500; font-size: 11px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #fff; background: var(--qdt-caption-bg); padding: 6px 10px;
  display: inline-flex; gap: 6px; align-items: baseline;
}
#quadra-timeline .qdt-panel__product-em { opacity: 0.6; }

#quadra-timeline .qdt-panel__body {
  padding: 28px 28px 28px 8px; display: flex; flex-direction: column; gap: 14px;
}
#quadra-timeline .qdt-panel__meta {
  display: flex; justify-content: space-between;
  border-bottom: 1px solid var(--qdt-rule); padding-bottom: 10px;
}
#quadra-timeline .qdt-panel__years { color: var(--qdt-fg-soft); }
#quadra-timeline .qdt-panel__era {
  font-family: var(--qdt-display); font-weight: 700;
  font-size: clamp(40px, 4vw, 72px); line-height: 0.85; letter-spacing: -0.02em;
  text-transform: lowercase; margin: 4px 0 -2px; color: var(--qdt-fg);
}
#quadra-timeline .qdt-panel__title {
  font-family: var(--qdt-display); font-weight: 500;
  font-size: clamp(18px, 1.4vw, 24px); line-height: 1.05; letter-spacing: -0.01em;
  text-transform: lowercase; margin: 0 0 4px; color: var(--qdt-fg);
}
#quadra-timeline .qdt-panel__list {
  list-style: none; padding: 14px 0 0; margin: 6px 0 0;
  display: flex; flex-direction: column; gap: 9px;
  border-top: 1px solid var(--qdt-rule-soft);
}
#quadra-timeline .qdt-panel__list li {
  display: grid; grid-template-columns: 18px 1fr; gap: 10px;
  font-size: 13px; line-height: 1.4; letter-spacing: 0.02em; color: var(--qdt-fg-mute);
}
#quadra-timeline .qdt-panel__dash { color: var(--qdt-accent); font-weight: 700; }

/* ---- controls ---- */
#quadra-timeline .qdt-controls {
  position: absolute; right: 28px; bottom: 22px;
  display: flex; align-items: center; gap: 10px; z-index: 4;
}
#quadra-timeline .qdt-ctrl {
  width: 40px; height: 40px; background: transparent; color: var(--qdt-fg);
  border: 1px solid var(--qdt-rule-strong); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 180ms var(--qdt-ease);
}
#quadra-timeline .qdt-ctrl:hover:not(:disabled) { background: var(--qdt-fg); color: #fff; border-color: var(--qdt-fg); }
#quadra-timeline .qdt-ctrl:disabled { opacity: 0.3; cursor: not-allowed; }
#quadra-timeline .qdt-controls__hint {
  color: var(--qdt-fg-soft); margin-left: 6px;
  font-family: var(--qdt-display); font-weight: 500; font-size: 12px;
  letter-spacing: 0.10em; text-transform: uppercase;
}

@media (max-width: 900px) {
  #quadra-timeline .qdt-panel { grid-template-columns: 1fr; }
  #quadra-timeline .qdt-panel__media { aspect-ratio: 4 / 3; }
  #quadra-timeline .qdt-spine, #quadra-timeline .qdt-track__inner { padding-left: 24px; padding-right: 24px; }
}

/* page reset — only affects the standalone test page, not your Drupal theme */
html,body{margin:0;background:#EFEDE7;}
</style>
</head>
<body>
<div id="quadra-timeline"></div>
<script>
/* Quadra 30 Years — standalone filmstrip (vanilla JS, zero dependencies).
   To swap images: replace each `image:` URL below with your Media Hub link. */

(function () {
  var ERAS = [
    {
      id: 'foundations', era: '1990s', yearRange: '1990 — 1999', stamp: 'era 01',
      title: 'built for purpose, from day one',
      image: 'https://mediahub.beechfieldbrands.com/asset/503b9d46-a132-44ca-94ea-b4587490ebd4/Product-medium/quadra_qd80_black.jpg',
      productCode: 'QD80', productName: 'Jumbo Sports Holdall',
      points: [
        'Quadra launches with hard-working bags built around everyday durability and function',
        'Sports holdalls, record bags and travel formats set the focus: useful storage, robust fabrics, dependable construction',
        'Reinforced bases, protective feet and functional silhouettes prioritise longevity over trend',
        'The starting point for everything that follows: bags that work hard, last well and decorate cleanly'
      ]
    },
    {
      id: 'work-travel-mobile', era: 'Early 2000s', yearRange: '2000 — 2005', stamp: 'era 02',
      title: 'work, travel and the move to mobile',
      image: 'https://mediahub.beechfieldbrands.com/asset/1c347b58-3463-4134-bffd-d34a586263cf/Product-medium/quadra_qd968_black_dark-graphite.jpg',
      productCode: 'QD968', productName: 'Tungsten Laptop Backpack',
      points: [
        'Bag design begins to reflect a working day spent across desks, transit and trips away',
        'Structured silhouettes, wider compartments and smarter internal layouts carry documents, early laptops and travel essentials in one bag',
        'Document sections, quick-access pockets and luggage straps make daily carry simpler',
        'The range shifts from pure utility into a cleaner work-and-travel proposition'
      ]
    },
    {
      id: 'connected-carry', era: 'Mid 2000s — Early 2010s', yearRange: '2006 — 2012', stamp: 'era 03',
      title: 'performance and connected carry',
      image: 'https://mediahub.beechfieldbrands.com/asset/383a7b57-7add-4108-b3d0-8765036bb698/Product-medium/quadra_qd655_olive-green.jpg',
      productCode: 'QD655', productName: 'Vintage Canvas Satchel',
      points: [
        'Backpacks and travel bags become more technical for commuters, travellers and active users',
        'Padded device compartments, media pockets and headphone ports support always-on routines',
        'Wheelie cases and carry-on formats extend the range into business travel and team kit',
        'Lighter, performance fabrics sit alongside Quadra\u2019s core in durable, practical construction'
      ]
    },
    {
      id: 'modern', era: 'Mid 2010s — Today', yearRange: '2013 — 2026', stamp: 'era 04',
      title: 'modern life, refined and responsible',
      image: 'https://mediahub.beechfieldbrands.com/asset/17a9333f-064e-43e7-b911-2251c63146f7/Product-medium/QD544-Zurich-35-Litre-Hybrid-Holdall-Black-QD545-Zurich-45-Litre-Hybrid-Holdall-Black-Lifestyle-shot.jpg',
      productCode: 'QD544 / QD545', productName: 'Zurich Hybrid Holdall',
      points: [
        'Quadra evolves into a refined, feature-rich range built around work, travel, lifestyle and decoration',
        'Products now organise laptops, tablets, cables, chargers and power banks; integrated charging, security-led access and weather-resistant finishes support hybrid working',
        'Decoration-friendly panels and TearAway labels make rebranding cleaner at volume',
        'GRS certified recycled polyester and water-repellent fabrics run through key collections — responsible materials, same performance intent'
      ]
    }
  ];

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function pad(n) { return String(n).padStart(2, '0'); }

  function build(root) {
    var n = ERAS.length;

    var ticks = ERAS.map(function (e, i) {
      var left = (i / (n - 1)) * 100;
      return '<button class="qdt-tick" data-i="' + i + '" style="left:' + left + '%">' +
        '<span class="qdt-tick__dot"></span>' +
        '<span class="qdt-tick__year">' + esc(e.era) + '</span></button>';
    }).join('');

    var panels = ERAS.map(function (e, i) {
      var pts = e.points.map(function (p) {
        return '<li><span class="qdt-panel__dash">—</span><span>' + esc(p) + '</span></li>';
      }).join('');
      return '<article class="qdt-panel" data-i="' + i + '">' +
        '<div class="qdt-panel__media">' +
          '<img src="' + esc(e.image) + '" alt="' + esc(e.productName) + '" loading="lazy">' +
          '<div class="qdt-panel__product"><span>' + esc(e.productCode) + '</span>' +
            '<span class="qdt-panel__product-em">—</span><span>' + esc(e.productName) + '</span></div>' +
        '</div>' +
        '<div class="qdt-panel__body">' +
          '<div class="qdt-panel__meta"><span class="qdt-eyebrow">' + esc(e.stamp) + '</span>' +
            '<span class="qdt-eyebrow qdt-panel__years">' + esc(e.yearRange) + '</span></div>' +
          '<h2 class="qdt-panel__era">' + esc(e.era) + '</h2>' +
          '<h3 class="qdt-panel__title">' + esc(e.title) + '</h3>' +
          '<ul class="qdt-panel__list">' + pts + '</ul>' +
        '</div>' +
      '</article>';
    }).join('');

    root.innerHTML =
      '<div class="qdt-spine"><div class="qdt-spine__inner">' +
        '<div class="qdt-spine__label"><span class="qdt-eyebrow">30 years of innovation</span>' +
          '<span class="qdt-spine__counter"><span class="qdt-spine__counter-num">01</span>' +
            '<span class="qdt-spine__counter-sep">/</span><span>' + pad(n) + '</span></span></div>' +
        '<div class="qdt-spine__track"><div class="qdt-spine__rule"></div>' + ticks +
          '<div class="qdt-spine__progress" style="width:0%"></div></div>' +
      '</div></div>' +
      '<div class="qdt-track"><div class="qdt-track__inner">' + panels + '</div></div>' +
      '<div class="qdt-controls">' +
        '<button class="qdt-ctrl" data-nav="-1" aria-label="Previous era"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 6l-6 6 6 6"/></svg></button>' +
        '<button class="qdt-ctrl" data-nav="1" aria-label="Next era"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 6l6 6-6 6"/></svg></button>' +
        '<div class="qdt-controls__hint">drag · scroll · click</div>' +
      '</div>';

    var track = root.querySelector('.qdt-track');
    var panelEls = Array.prototype.slice.call(root.querySelectorAll('.qdt-panel'));
    var tickEls = Array.prototype.slice.call(root.querySelectorAll('.qdt-tick'));
    var progress = root.querySelector('.qdt-spine__progress');
    var counterNum = root.querySelector('.qdt-spine__counter-num');
    var prevBtn = root.querySelector('[data-nav="-1"]');
    var nextBtn = root.querySelector('[data-nav="1"]');
    var active = 0;

    function setActive(i) {
      active = i;
      panelEls.forEach(function (p, j) { p.classList.toggle('is-active', j === i); });
      tickEls.forEach(function (t, j) { t.classList.toggle('is-active', j === i); });
      progress.style.width = ((i / (n - 1)) * 100) + '%';
      counterNum.textContent = pad(i + 1);
      prevBtn.disabled = i === 0;
      nextBtn.disabled = i === n - 1;
    }

    function scrollToEra(i) {
      i = Math.max(0, Math.min(n - 1, i));
      setActive(i);
      var node = panelEls[i];
      var left = node.offsetLeft - (track.clientWidth - node.clientWidth) / 2;
      track.scrollTo({ left: Math.max(0, left), behavior: 'smooth' });
    }

    // active = most-centered panel
    var raf = 0;
    track.addEventListener('scroll', function () {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(function () {
        var center = track.scrollLeft + track.clientWidth / 2;
        var best = 0, bestDist = Infinity;
        panelEls.forEach(function (node, i) {
          var c = node.offsetLeft + node.clientWidth / 2;
          var d = Math.abs(c - center);
          if (d < bestDist) { bestDist = d; best = i; }
        });
        if (best !== active) setActive(best);
      });
    }, { passive: true });

    // click panels + ticks
    panelEls.forEach(function (p) { p.addEventListener('click', function () { scrollToEra(+p.dataset.i); }); });
    tickEls.forEach(function (t) { t.addEventListener('click', function () { scrollToEra(+t.dataset.i); }); });
    prevBtn.addEventListener('click', function () { scrollToEra(active - 1); });
    nextBtn.addEventListener('click', function () { scrollToEra(active + 1); });

    // drag-to-pan
    var isDown = false, startX = 0, startScroll = 0;
    track.addEventListener('mousedown', function (e) {
      if (e.target.closest('button, a')) return;
      isDown = true; startX = e.pageX; startScroll = track.scrollLeft;
      track.classList.add('is-grabbing');
    });
    window.addEventListener('mousemove', function (e) {
      if (!isDown) return;
      track.scrollLeft = startScroll - (e.pageX - startX);
    });
    window.addEventListener('mouseup', function () { isDown = false; track.classList.remove('is-grabbing'); });

    // vertical wheel → horizontal pan (releases at the ends)
    track.addEventListener('wheel', function (e) {
      if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
      var max = track.scrollWidth - track.clientWidth;
      if ((track.scrollLeft <= 0 && e.deltaY < 0) || (track.scrollLeft >= max - 1 && e.deltaY > 0)) return;
      e.preventDefault();
      track.scrollLeft += e.deltaY;
    }, { passive: false });

    setActive(0);
  }

  function init() {
    var root = document.getElementById('quadra-timeline');
    if (root) build(root);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else { init(); }
})();

</script>
</body>
</html>
